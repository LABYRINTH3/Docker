name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      flash_attn_jobs:
        description: "flash-attn compile parallelism (recommended: 2 on private runner, 4 on public runner)"
        required: false
        default: "4"
      image_tag:
        description: "Docker tag to push"
        required: false
        default: "fa2-cu126-r1"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show disk usage (before cleanup)
        run: df -h

      - name: Free disk space on runner
        run: |
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo apt-get clean
          docker system prune -af || true

      - name: Show disk usage (after cleanup)
        run: df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          pull: true
          push: true
          platforms: linux/amd64
          tags: taehoon3/runpod:${{ github.event.inputs.image_tag }}
          build-args: |
            FLASH_ATTN_MAX_JOBS=${{ github.event.inputs.flash_attn_jobs }}
            FLASH_ATTN_NVCC_THREADS=${{ github.event.inputs.flash_attn_jobs }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
